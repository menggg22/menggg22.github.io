<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brook Farm — AI Commune Replay</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Crimson+Pro:ital,wght@0,400;0,700;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #faf8f4;
    color: #2a2a2a;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 20px;
  }

  #app {
    max-width: 720px;
    width: 100%;
  }

  .screen { display: none; }
  .screen.active { display: block; }

  /* Agent colors — darker for light bg */
  .agent-gr { color: #2563a8; }
  .agent-nh { color: #8b3daa; }
  .agent-sr { color: #b5850a; }
  .agent-cd { color: #2d8a4e; }
  .agent-jd { color: #1a7a7a; }

  .dim { opacity: 0.45; }
  .bold { font-weight: 700; }
  .red { color: #c0392b; }
  .yellow { color: #b5850a; }
  .green { color: #2d8a4e; }
  .magenta { color: #8b3daa; }

  .divider {
    border: none;
    border-top: 1px solid #d5d0c8;
    margin: 24px 0;
  }

  /* ── Home / Run Selector ── */
  .home-header {
    text-align: center;
    margin: 40px 0 20px;
  }
  .home-header .scene {
    font-size: 20px;
    letter-spacing: 4px;
    margin-bottom: 8px;
  }
  .home-header h1 {
    font-family: 'Crimson Pro', serif;
    font-size: 28px;
    letter-spacing: 8px;
    font-weight: 700;
  }
  .home-header .subtitle {
    font-size: 12px;
    opacity: 0.5;
    margin-top: 4px;
  }
  .home-desc {
    text-align: center;
    margin: 20px 0 30px;
    line-height: 1.8;
    font-size: 14px;
  }
  .home-desc .hook {
    color: #c0392b;
    margin-top: 8px;
    font-weight: 700;
  }

  .run-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 20px 0;
  }
  .run-card {
    background: #f0ece4;
    border: 1px solid #d5d0c8;
    border-radius: 6px;
    padding: 16px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .run-card:hover {
    background: #e8e2d8;
    border-color: #b5a99a;
    transform: translateY(-1px);
  }
  .run-card .run-name {
    font-weight: 700;
    font-size: 14px;
    margin-bottom: 4px;
  }
  .run-card .run-desc {
    font-size: 12px;
    opacity: 0.6;
    line-height: 1.5;
  }
  .run-card .run-tag {
    display: inline-block;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 3px;
    margin-top: 8px;
    font-weight: 700;
  }
  .tag-baseline { background: #d4edda; color: #155724; }
  .tag-counterfactual { background: #fff3cd; color: #856404; }

  /* ── Intro ── */
  .intro-scene {
    text-align: center;
    font-size: 20px;
    letter-spacing: 4px;
    margin: 30px 0 10px;
  }
  .intro-title {
    text-align: center;
    margin: 20px 0;
  }
  .intro-title h1 {
    font-family: 'Crimson Pro', serif;
    font-size: 28px;
    letter-spacing: 8px;
    font-weight: 700;
  }
  .intro-title .subtitle {
    font-size: 12px;
    opacity: 0.5;
    margin-top: 4px;
  }
  .intro-quote {
    text-align: center;
    margin: 24px 0;
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 16px;
    color: #8b6914;
  }
  .intro-quote .attribution {
    font-size: 12px;
    font-style: normal;
    opacity: 0.5;
    margin-top: 4px;
  }
  .intro-desc {
    text-align: center;
    margin: 20px 0;
    line-height: 1.8;
  }
  .intro-desc .hook {
    color: #c0392b;
    margin-top: 12px;
  }
  .section-title {
    font-weight: 700;
    font-size: 13px;
    margin-bottom: 16px;
    letter-spacing: 1px;
  }
  .resident {
    margin-bottom: 20px;
    padding-left: 12px;
  }
  .resident .name { font-weight: 700; font-size: 15px; }
  .resident .tagline { opacity: 0.5; font-size: 13px; margin-top: 2px; }
  .intro-footer {
    text-align: center;
    opacity: 0.5;
    font-size: 12px;
    margin: 24px 0 8px;
  }

  /* ── Round view ── */
  .round-header {
    border: 1px solid #d5d0c8;
    background: #f0ece4;
    padding: 12px 16px;
    margin-bottom: 20px;
    border-radius: 4px;
  }
  .round-header h2 {
    font-size: 16px;
    letter-spacing: 2px;
  }

  .resources { margin-bottom: 20px; }
  .resource-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
    font-size: 13px;
  }
  .resource-label { width: 70px; }
  .bar-track {
    width: 160px;
    height: 12px;
    background: #e8e2d8;
    border-radius: 2px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s ease;
  }
  .bar-fill.food { background: #5da469; }
  .bar-fill.money { background: #c9a227; }
  .bar-fill.morale-high { background: #5da469; }
  .bar-fill.morale-mid { background: #c9a227; }
  .bar-fill.morale-low { background: #c0392b; }
  .resource-value { font-size: 12px; opacity: 0.6; }

  .section { margin-bottom: 28px; }
  .section h3 {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.4;
    margin-bottom: 14px;
    border-bottom: 1px solid #e0dbd3;
    padding-bottom: 6px;
  }

  .action-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
    font-size: 13px;
    align-items: baseline;
  }
  .action-emoji { width: 24px; text-align: center; }
  .action-agent {
    font-weight: 700;
    width: 110px;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    gap: 0;
  }
  /* agent colors applied via .agent-XX class on text */
  .action-role { opacity: 0.4; width: 70px; font-size: 12px; }
  .action-type {
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.5px;
    background: #e8e2d8;
    padding: 1px 6px;
    border-radius: 3px;
    white-space: nowrap;
  }
  .action-detail { opacity: 0.7; font-family: 'Crimson Pro', serif; font-size: 14px; }

  /* expandable conversations */
  .conversation {
    margin-bottom: 20px;
    padding-left: 12px;
    border-left: 3px solid #d5d0c8;
  }
  .conversation .speaker { font-weight: 700; font-size: 13px; margin-bottom: 4px; }
  .conversation .says {
    font-family: 'Crimson Pro', serif;
    font-size: 16px;
    font-style: italic;
    margin: 4px 0 6px;
    line-height: 1.5;
  }
  .conversation .inner {
    font-size: 13px;
    opacity: 0.55;
    font-family: 'Crimson Pro', serif;
    padding: 6px 10px;
    background: rgba(0,0,0,0.025);
    border-radius: 3px;
    margin: 4px 0;
    line-height: 1.5;
  }
  .conversation .expand-btn {
    font-size: 12px;
    color: #2563a8;
    cursor: pointer;
    margin-top: 8px;
    border: none;
    background: none;
    font-family: inherit;
    padding: 0;
  }
  .conversation .expand-btn:hover { text-decoration: underline; }
  .conversation .full-convo {
    display: none;
    margin-top: 14px;
    padding: 16px;
    background: #f0ece4;
    border-radius: 6px;
  }
  .conversation .full-convo.open { display: block; }
  .full-convo .turn {
    margin-bottom: 16px;
    padding-bottom: 14px;
    border-bottom: 1px solid #e0dbd3;
  }
  .full-convo .turn:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .full-convo .turn-says {
    font-family: 'Crimson Pro', serif;
    font-size: 15px;
    font-style: italic;
    margin: 4px 0 6px;
    line-height: 1.5;
  }
  .full-convo .turn-inner {
    font-size: 13px;
    opacity: 0.5;
    font-family: 'Crimson Pro', serif;
    margin-top: 6px;
    padding: 6px 10px;
    background: rgba(0,0,0,0.03);
    border-radius: 3px;
    line-height: 1.5;
  }

  .key-moment {
    margin-bottom: 14px;
    padding: 10px 12px;
    border-left: 3px solid #8b3daa;
    background: rgba(139, 61, 170, 0.04);
    border-radius: 0 4px 4px 0;
  }
  .key-moment .desc {
    font-size: 14px;
    font-family: 'Crimson Pro', serif;
    line-height: 1.5;
  }
  .key-moment .emotion {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: #8b3daa;
    margin-top: 4px;
  }

  .departure-box {
    border: 1px solid #c0392b;
    padding: 12px 16px;
    margin-bottom: 16px;
    background: #fdf0ef;
    border-radius: 4px;
  }
  .departure-box .departed-name { color: #c0392b; font-weight: 700; font-size: 15px; }
  .departure-box .farewell {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 14px;
    opacity: 0.6;
    margin-top: 6px;
  }

  .vote-box {
    border: 1px solid #c9a227;
    padding: 10px 14px;
    margin-bottom: 12px;
    background: #fdfaef;
    border-radius: 4px;
    font-size: 13px;
  }

  .historical-event {
    color: #8b6914;
    font-size: 13px;
    margin-bottom: 12px;
  }

  .status-strip {
    display: flex;
    gap: 14px;
    font-size: 12px;
    padding: 12px 14px;
    margin-top: 8px;
    background: #f0ece4;
    border-radius: 4px;
    flex-wrap: wrap;
    align-items: center;
  }
  .status-strip .status-label {
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    opacity: 0.4;
    font-weight: 700;
    width: 100%;
    margin-bottom: 2px;
  }
  .status-agent { white-space: nowrap; }
  .status-agent .sat-val {
    display: inline-block;
    min-width: 20px;
    text-align: right;
    font-weight: 700;
  }
  .status-gone { opacity: 0.3; text-decoration: line-through; }

  /* ── Finale ── */
  .finale-scene {
    text-align: center;
    font-size: 20px;
    letter-spacing: 4px;
    margin: 30px 0 10px;
  }
  .finale-title { text-align: center; margin: 20px 0; }
  .finale-title h1 {
    font-family: 'Crimson Pro', serif;
    font-size: 28px;
    letter-spacing: 6px;
    color: #c0392b;
  }
  .finale-title .subtitle { font-size: 13px; opacity: 0.5; margin-top: 4px; }

  .fate { margin-bottom: 18px; padding-left: 12px; }
  .fate .name { font-weight: 700; font-size: 15px; }
  .fate .status-line { font-size: 13px; margin-top: 2px; }
  .fate .farewell-quote {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 13px;
    opacity: 0.5;
    margin-top: 2px;
  }
  .final-stats {
    font-size: 12px;
    opacity: 0.5;
    text-align: center;
    margin: 16px 0;
  }

  /* ── Controls ── */
  .controls {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: #f0ece4;
    border-top: 1px solid #d5d0c8;
    padding: 12px 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    z-index: 10;
  }
  .controls button {
    background: #fff;
    color: #2a2a2a;
    border: 1px solid #c5bfb5;
    padding: 8px 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.2s;
  }
  .controls button:hover { background: #e8e2d8; }
  .controls button:disabled { opacity: 0.3; cursor: default; }
  .controls button.home-btn {
    font-size: 16px;
    padding: 8px 12px;
  }
  .controls .round-indicator {
    font-size: 12px;
    opacity: 0.5;
    min-width: 100px;
    text-align: center;
  }
  .spacer { height: 70px; }

  .site-footer {
    text-align: center;
    font-size: 11px;
    opacity: 0.4;
    padding: 16px 0 80px;
    line-height: 1.6;
  }
  .site-footer a {
    color: inherit;
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .site-footer a:hover { opacity: 0.8; }

  @media (max-width: 600px) {
    body { font-size: 13px; padding: 10px; }
    .intro-title h1, .home-header h1 { font-size: 22px; letter-spacing: 4px; }
    .bar-track { width: 100px; }
    .action-role { display: none; }
    .controls button { padding: 8px 14px; font-size: 12px; }
    .run-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div id="app">
  <div id="home-screen" class="screen active"></div>
  <div id="intro-screen" class="screen"></div>
  <div id="round-screen" class="screen"></div>
  <div id="finale-screen" class="screen"></div>
  <div class="spacer"></div>
  <div class="site-footer">
    Built by <a href="https://menggg22.github.io">Menggg</a> ✨ · <a href="https://github.com/menggg22/utopia">Source on GitHub</a> · CC BY-NC 4.0
  </div>
</div>

<div class="controls">
  <button class="home-btn" id="btn-home" onclick="goHome()" title="Back to run selector">🏠</button>
  <button id="btn-back" onclick="goBack()" disabled>← Back</button>
  <span class="round-indicator" id="round-indicator"></span>
  <button id="btn-next" onclick="goNext()">Begin →</button>
</div>

<script>
const AGENTS = {
  "George Ripley":       { icon: "⛪ George", cls: "agent-gr", role: "Founder" },
  "Nathaniel Hawthorne": { icon: "🪶 Nathaniel", cls: "agent-nh", role: "Writer" },
  "Sophia Ripley":       { icon: "📖 Sophia", cls: "agent-sr", role: "Teacher" },
  "Charles Dana":        { icon: "📰 Charles", cls: "agent-cd", role: "Editor" },
  "John Sullivan Dwight":{ icon: "🎻 Dwight", cls: "agent-jd", role: "Musician" },
};
const TAGLINES = {
  "George Ripley":       "Left the ministry to prove utopia is possible. Needs it to work more than anyone.",
  "Nathaniel Hawthorne": "Joined not for ideology but to save money to marry. Watches more than he participates.",
  "Sophia Ripley":       "Runs the school — the commune's only real income. Missed two classes in six years.",
  "Charles Dana":        "22 years old, speaks ten languages, does whatever needs doing. The practical one.",
  "John Sullivan Dwight":"Escaped a failed ministry. Found music. Will stay as long as the concerts continue.",
};
const ACTION_EMOJI = {
  FARM:"🌾", TEACH:"📚", WRITE:"✍️", SPEAK:"🗣️", ORGANIZE:"🎵",
  TRADE:"💰", BUILD:"🔨", REPAIR:"🔧", REST:"💤", LEAVE:"🚪",
  PROPOSE_RULE:"📜", RULE:"📜", VOTE:"🗳️"
};
const SEASON_EMOJI = { spring:"🌱", summer:"☀️", fall:"🍂", winter:"❄️" };

// RUN_META is generated dynamically from ALL_RUNS keys
let RUN_META = {};

function buildRunMeta() {
  RUN_META = {};
  for (const key of Object.keys(ALL_RUNS)) {
    const lk = key.toLowerCase();
    let tag = "baseline";
    if (lk.includes("no_") || lk.includes("no ") || lk.includes("double") || lk.includes("2x")) tag = "counterfactual";
    RUN_META[key] = {
      name: key,
      desc: "",
      tag: tag,
    };
  }
}

let ALL_RUNS = {};
let roundData = [];
let currentIdx = -1; // -1=intro, 0..n=rounds, n+1=finale
let currentRunKey = null;

function parseEvents(events) {
  const rounds = {};
  let maxRound = 0;
  const agentsPresent = new Set();
  const satMap = {};
  for (const e of events) {
    if (e.type === "persona_loaded") { agentsPresent.add(e.agent); satMap[e.agent] = 70; }
    const r = e.round || 0;
    if (r > 0) { if (!rounds[r]) rounds[r] = []; rounds[r].push(e); if (r > maxRound) maxRound = r; }
  }
  const data = [];
  const snap = { agents: new Set(agentsPresent), sat: {...satMap} };
  for (let r = 1; r <= maxRound; r++) {
    const evts = rounds[r] || [];
    const rd = { round: r, env: {}, actions: [], conversations: [], reflections: [],
                 keyMoments: [], departures: [], historicalEvents: [], votes: [],
                 agentsPresent: null, satMap: null };
    for (const e of evts) {
      switch(e.type) {
        case "env_state": rd.env = e.data || {}; break;
        case "action": rd.actions.push(e); break;
        case "utterance": rd.conversations.push(e); break;
        case "reflection":
          rd.reflections.push(e);
          if (e.data?.satisfaction != null) snap.sat[e.agent] = e.data.satisfaction;
          break;
        case "key_moment": rd.keyMoments.push(e); break;
        case "agent_departed": rd.departures.push(e); snap.agents.delete(e.agent); break;
        case "historical_event": rd.historicalEvents.push(e.data?.description || ""); break;
        case "vote_result": rd.votes.push(e); break;
      }
    }
    rd.agentsPresent = new Set(snap.agents);
    rd.satMap = {...snap.sat};
    data.push(rd);
  }
  return data;
}

function firstSentence(text, maxLen = 120) {
  if (!text) return "";
  // Find sentence boundary, skipping honorifics (Mr. Mrs. Dr. etc.)
  const honorifics = /\b(Mr|Mrs|Ms|Dr|St|Rev|Jr|Sr|Vol|vs|etc|cf)\.\s/gi;
  let searchText = text.replace(honorifics, (m) => m.replace(". ", "·\u200B"));
  for (const end of [". ", "! ", "? ", "—"]) {
    const idx = searchText.indexOf(end);
    if (idx !== -1 && idx < maxLen && idx > 15) {
      return text.slice(0, idx + end.trimEnd().length);
    }
  }
  return text.length > maxLen ? text.slice(0, maxLen - 3) + "..." : text;
}

function moraleClass(m) { return m >= 60 ? "morale-high" : m >= 30 ? "morale-mid" : "morale-low"; }
function satColorClass(s) { return s >= 60 ? "green" : s >= 30 ? "yellow" : "red"; }

let convoCounter = 0;
function toggleConvo(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle("open");
}

// ── Render: Home ──
function renderHome() {
  const baselines = Object.entries(RUN_META).filter(([k,v]) => v.tag === "baseline");
  const counterfactuals = Object.entries(RUN_META).filter(([k,v]) => v.tag === "counterfactual");
  return `
    <div class="home-header">
      <div class="scene">🌳🌾🌳 &nbsp; 🏠 &nbsp; 🏫 &nbsp; 🌳🌾🌳</div>
      <h1>🏡 B R O O K &nbsp; F A R M</h1>
      <div class="subtitle">An AI Agent Utopian Commune Simulation</div>
    </div>
    <div class="home-desc">
      Five AI agents, modeled after real 1840s transcendentalists,<br>
      try to build a utopian community. None of them know how it ends.
      <div class="hook">Choose a simulation to watch.</div>
    </div>
    <div class="section-title">🌱 Baselines</div>
    <div class="run-grid">
      ${baselines.map(([key, meta]) => `
        <div class="run-card" onclick="selectRun('${key}')">
          <div class="run-name">${meta.name}</div>
          <div class="run-desc">${meta.desc}</div>
          <span class="run-tag tag-baseline">BASELINE</span>
        </div>
      `).join("")}
    </div>
    <div class="section-title" style="margin-top:24px">🔬 What If...?</div>
    <div class="run-grid">
      ${counterfactuals.map(([key, meta]) => `
        <div class="run-card" onclick="selectRun('${key}')">
          <div class="run-name">${meta.name}</div>
          <div class="run-desc">${meta.desc}</div>
          <span class="run-tag tag-counterfactual">COUNTERFACTUAL</span>
        </div>
      `).join("")}
    </div>
  `;
}

// ── Render: Intro ──
function renderIntro() {
  return `
    <div class="intro-scene">🌳🌾🌳 &nbsp; 🏠 &nbsp; 🏫 &nbsp; 🌳🌾🌳</div>
    <div style="text-align:center;opacity:0.4;font-size:16px;letter-spacing:3px">🌿 &nbsp; 🐄 &nbsp; 🌻 🌻 &nbsp; 🐔 &nbsp; 🌿</div>
    <div class="intro-title">
      <h1>🏡 B R O O K &nbsp; F A R M</h1>
      <div class="subtitle">West Roxbury, Massachusetts — 1841</div>
    </div>
    <div class="intro-quote">
      "A light over this country and this age."
      <div class="attribution">— George Ripley, in a letter to Ralph Waldo Emerson</div>
    </div>
    <div class="intro-desc">
      A transcendentalist commune founded on a radical idea:<br>
      that intellectual life and manual labor can coexist,<br>
      that a community of thinkers can also feed itself.
      <div class="hook">It lasted six years. Today we rebuild it with AI agents to see how it falls apart.</div>
    </div>
    <hr class="divider">
    <div class="section-title">👥 THE RESIDENTS</div>
    ${Object.entries(AGENTS).map(([name, a]) => `
      <div class="resident">
        <div class="name"><span class="${a.cls}">${a.icon}</span> — ${a.role}</div>
        <div class="tagline">${TAGLINES[name]}</div>
      </div>
    `).join("")}
    <hr class="divider">
    <div class="intro-footer">
      🎭 30 rounds • 6 years • Every decision made by AI agents<br>
      who don't know what happened to the real Brook Farm.
    </div>
  `;
}

// ── Render: Round ──
function renderRound(rd) {
  const env = rd.env;
  const season = env.season || "spring";
  const morale = env.morale || 0;

  let html = `
    <div class="round-header">
      <h2>${SEASON_EMOJI[season] || ""} Round ${rd.round} &nbsp;•&nbsp; ${env.date || ""} &nbsp;•&nbsp; ${season.toUpperCase()}</h2>
    </div>
    <div class="resources">
      <div class="resource-row">
        <span class="resource-label">🍞 Food</span>
        <div class="bar-track"><div class="bar-fill food" style="width:${Math.min(100,(env.food||0)/2)}%"></div></div>
        <span class="resource-value">${env.food||0}</span>
      </div>
      <div class="resource-row">
        <span class="resource-label">💵 Money</span>
        <div class="bar-track"><div class="bar-fill money" style="width:${Math.min(100,(env.money||0)/5)}%"></div></div>
        <span class="resource-value">$${env.money||0}</span>
      </div>
      <div class="resource-row">
        <span class="resource-label">♥ Morale</span>
        <div class="bar-track"><div class="bar-fill ${moraleClass(morale)}" style="width:${morale}%"></div></div>
        <span class="resource-value">${morale}%</span>
      </div>
      <div class="resource-row">
        <span class="resource-label">👥 Members</span>
        <span class="resource-value">${rd.agentsPresent.size}/5</span>
      </div>
    </div>`;

  for (const he of rd.historicalEvents) {
    if (he) html += `<div class="historical-event">📜 ${he}</div>`;
  }
  for (const d of rd.departures) {
    const concerns = d.data?.final_concerns || [];
    const farewell = firstSentence(concerns[0] || "", 150);
    html += `<div class="departure-box">
      <div class="departed-name">🚪 ${d.agent} DEPARTS (satisfaction: ${d.data?.final_satisfaction ?? "?"})</div>
      ${farewell ? `<div class="farewell">"${farewell}"</div>` : ""}
    </div>`;
  }

  // Actions
  html += `<div class="section"><h3>Actions</h3>`;
  for (const a of rd.actions) {
    if (!rd.agentsPresent.has(a.agent) && !rd.departures.find(d => d.agent === a.agent)) continue;
    const ag = AGENTS[a.agent] || {};
    const chosen = a.data?.chosen_action || "";
    const actionType = chosen.split(" ")[0];
    const detail = chosen.slice(actionType.length).trim().replace(/^<|>$/g, "");
    const emoji = ACTION_EMOJI[actionType] || "❓";
    html += `<div class="action-row">
      <span class="action-agent ${ag.cls}">${ag.icon}</span>
      <span class="action-role">${ag.role || ""}</span>
      <span class="action-type">${emoji} ${actionType}</span>
      <span class="action-detail">${detail ? (actionType === "SPEAK" || actionType === "ORGANIZE" ? `"${firstSentence(detail, 80)}"` : firstSentence(detail, 80)) : ""}</span>
    </div>`;
  }
  html += `</div>`;

  // Conversations — expandable
  if (rd.conversations.length > 0) {
    html += `<div class="section"><h3>Conversations</h3>`;
    // group by conversation_id
    const convos = {};
    for (const c of rd.conversations) {
      const cid = c.data?.conversation_id || `unknown_${convoCounter++}`;
      if (!convos[cid]) convos[cid] = [];
      convos[cid].push(c);
    }
    let shown = 0;
    for (const [cid, turns] of Object.entries(convos)) {
      if (shown >= 3) break;
      const first = turns[0];
      const ag = AGENTS[first.agent] || {};
      // Find second speaker
      const second = turns.find(t => t.agent !== first.agent);
      const ag2 = second ? (AGENTS[second.agent] || {}) : null;
      const pairLabel = ag2
        ? `<span class="${ag.cls}">${ag.icon}</span> ↔ <span class="${ag2.cls}">${ag2.icon}</span>`
        : `<span class="${ag.cls}">${ag.icon}</span>`;
      const says = firstSentence((first.data?.says || "").replace(/^"|"$/g, ""), 140);
      const inner = firstSentence((first.data?.inner_thought || "").replace(/^\*|\*$/g, ""), 120);
      const expandId = `convo_${convoCounter++}`;

      html += `<div class="conversation">
        <div class="speaker">${pairLabel}</div>
        <div class="says">"${says}"</div>
        ${inner ? `<div class="inner">${inner}</div>` : ""}`;

      if (turns.length > 1) {
        html += `<button class="expand-btn" onclick="toggleConvo('${expandId}')">
          ▶ Read full conversation (${turns.length} turns)
        </button>
        <div class="full-convo" id="${expandId}">`;
        for (const t of turns) {
          const ta = AGENTS[t.agent] || {};
          const tsays = (t.data?.says || "").replace(/^"|"$/g, "");
          const tinner = (t.data?.inner_thought || "").replace(/^\*|\*$/g, "");
          html += `<div class="turn">
            <span class="speaker ${ta.cls}">${ta.icon}</span>
            <div class="turn-says">"${tsays}"</div>
            ${tinner ? `<div class="turn-inner">${tinner}</div>` : ""}
          </div>`;
        }
        html += `</div>`;
      }
      html += `</div>`;
      shown++;
    }
    html += `</div>`;
  }

  // Key moments
  if (rd.keyMoments.length > 0) {
    html += `<div class="section"><h3>Key Moments</h3>`;
    for (const km of rd.keyMoments.slice(0, 3)) {
      const ag = AGENTS[km.agent] || {};
      html += `<div class="key-moment">
        <div class="desc"><span class="${ag.cls}">★ ${ag.icon}</span>: ${firstSentence(km.data?.description || "", 150)}</div>
        ${km.data?.emotion ? `<div class="emotion">Feeling: ${km.data.emotion}</div>` : ""}
      </div>`;
    }
    html += `</div>`;
  }

  // Votes
  for (const v of rd.votes) {
    html += `<div class="vote-box">
      🗳️ <strong>VOTE:</strong> ${firstSentence(v.data?.proposal || "", 100)}<br>
      Result: ${v.data?.result || ""}
    </div>`;
  }

  // Status strip
  html += `<div class="status-strip">`;
  html += `<div class="status-label">Satisfaction</div>`;
  for (const [name, a] of Object.entries(AGENTS)) {
    const sat = rd.satMap[name] ?? "?";
    if (!rd.agentsPresent.has(name)) {
      html += `<span class="status-agent status-gone">${a.icon} gone</span>`;
    } else {
      html += `<span class="status-agent ${satColorClass(sat)}">${a.icon} <span class="sat-val">${sat}</span></span>`;
    }
  }
  html += `</div>`;
  return html;
}

// ── Render: Finale ──
function renderFinale() {
  const final = roundData[roundData.length - 1];
  const departed = new Set();
  for (const name of Object.keys(AGENTS)) {
    if (!final.agentsPresent.has(name)) departed.add(name);
  }
  let html = `
    <div class="finale-scene">🌳 &nbsp;🍂&nbsp; 🏚️ &nbsp; 🏚️ &nbsp;🍂&nbsp; 🌳</div>
    <div style="text-align:center;opacity:0.4;font-size:16px;letter-spacing:3px">🌿 &nbsp;&nbsp;&nbsp; 🍂 &nbsp; 🍂 &nbsp;&nbsp;&nbsp; 🌿</div>
    <div class="finale-title">
      <h1>T H E &nbsp; E N D</h1>
      <div class="subtitle">${final.env.date || ""} — Brook Farm closes.</div>
    </div>
    <hr class="divider">
    <div class="section-title">👥 FINAL FATES</div>`;

  for (const [name, a] of Object.entries(AGENTS)) {
    const sat = final.satMap[name] ?? "?";
    let statusLine, farewell = "";
    if (departed.has(name)) {
      for (const rd of roundData) {
        for (const d of rd.departures) {
          if (d.agent === name) {
            statusLine = `<span class="red">Departed round ${d.data?.round||"?"} (${d.data?.date||""})</span>`;
            farewell = firstSentence((d.data?.final_concerns||[])[0] || "", 120);
          }
        }
      }
    } else {
      statusLine = `<span class="dim">Remained to the end</span>`;
    }
    html += `<div class="fate">
      <div class="name"><span class="${a.cls}">${a.icon}</span> — ${a.role}</div>
      <div class="status-line"><span class="${satColorClass(sat)}">Satisfaction: ${sat}</span> &nbsp;•&nbsp; ${statusLine}</div>
      ${farewell ? `<div class="farewell-quote">"${farewell}"</div>` : ""}
    </div>`;
  }

  html += `<hr class="divider">
    <div class="final-stats">
      Final state: 🍞 ${final.env.food??0} food &nbsp; 💵 $${final.env.money??0} &nbsp; ♥ ${final.env.morale??0}% morale<br>
      Survived: ${final.agentsPresent.size}/5 &nbsp;•&nbsp; Departed: ${departed.size}/5
    </div>`;
  return html;
}

// ── Navigation ──
function show(screenId) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(screenId).classList.add("active");
}

function renderCurrent() {
  const btnBack = document.getElementById("btn-back");
  const btnNext = document.getElementById("btn-next");
  const indicator = document.getElementById("round-indicator");
  const btnHome = document.getElementById("btn-home");

  if (!currentRunKey) {
    // home
    document.getElementById("home-screen").innerHTML = renderHome();
    show("home-screen");
    btnBack.disabled = true; btnBack.style.display = "none";
    btnNext.style.display = "none";
    btnHome.style.display = "none";
    indicator.textContent = "";
    return;
  }

  btnBack.style.display = ""; btnNext.style.display = ""; btnHome.style.display = "";

  if (currentIdx === -1) {
    document.getElementById("intro-screen").innerHTML = renderIntro();
    show("intro-screen");
    btnBack.disabled = true;
    btnNext.textContent = "Begin →"; btnNext.disabled = false;
    indicator.textContent = RUN_META[currentRunKey]?.name || currentRunKey;
  } else if (currentIdx < roundData.length) {
    document.getElementById("round-screen").innerHTML = renderRound(roundData[currentIdx]);
    show("round-screen");
    btnBack.disabled = false;
    btnNext.textContent = currentIdx === roundData.length - 1 ? "Finale →" : "Next →";
    btnNext.disabled = false;
    indicator.textContent = `Round ${roundData[currentIdx].round} / ${roundData.length}`;
  } else {
    document.getElementById("finale-screen").innerHTML = renderFinale();
    show("finale-screen");
    btnBack.disabled = false;
    btnNext.disabled = true; btnNext.textContent = "End";
    indicator.textContent = "Finale";
  }
  window.scrollTo(0, 0);
}

function selectRun(key) {
  currentRunKey = key;
  roundData = parseEvents(ALL_RUNS[key]);
  currentIdx = -1;
  // Hide home button in single-run mode
  const homeBtn = document.getElementById("btn-home");
  if (homeBtn && Object.keys(ALL_RUNS).length <= 1) {
    homeBtn.style.display = "none";
  }
  renderCurrent();
}

function goHome() {
  currentRunKey = null;
  roundData = [];
  currentIdx = -1;
  renderCurrent();
}

function goNext() {
  if (currentRunKey && currentIdx < roundData.length) { currentIdx++; renderCurrent(); }
}
function goBack() {
  if (currentIdx > -1) { currentIdx--; renderCurrent(); }
  else if (currentIdx === -1 && currentRunKey) { goHome(); }
}

document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight" || e.key === " " || e.key === "Enter") { e.preventDefault(); goNext(); }
  if (e.key === "ArrowLeft" || e.key === "Backspace") { e.preventDefault(); goBack(); }
  if (e.key === "Escape") { e.preventDefault(); goHome(); }
});

// ── Boot: load data from external file ──
fetch('replay_data.json')
  .then(r => {
    if (!r.ok) throw new Error('Failed to load replay_data.json');
    return r.json();
  })
  .then(data => {
    if (data.runs) {
      // New format: {meta: {...}, runs: {...}}
      ALL_RUNS = data.runs;
      RUN_META = data.meta || {};
    } else {
      // Legacy format: {key: events}
      ALL_RUNS = data;
      buildRunMeta();
    }
    // Auto-select if only one run (single-story mode)
    const runKeys = Object.keys(ALL_RUNS);
    if (runKeys.length === 1) {
      selectRun(runKeys[0]);
    } else {
      renderCurrent();
    }
  })
  .catch(err => {
    document.getElementById('app').innerHTML =
      '<p style="color:#c0392b;margin-top:40px;">Could not load replay_data.json.<br><br>' +
      '1. Generate data: <code>python make_replay_data.py ../runs/</code><br>' +
      '2. Serve locally: <code>python -m http.server 8000</code> (from replay/ dir)<br>' +
      '3. Open: <code>http://localhost:8000/replay.html</code></p>';
  });
</script>

</html>
